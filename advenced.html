<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>advenced</title>
    <link rel="stylesheet" href="google1.css">
</head>
<body>
    <div class="index" id="g">
        <a href="image.html">image search</a>
    </div>
    <div class="index" id="t">
        <a href="index.html">google search</a>
    </div>
    <div class=google id="special"> 
        <span class="g1">G</span>
        <span class="o1">o</span>
        <span class="o2">o</span>
        <span class="g2">g</span>
        <span class="l">l</span>
        <span class="e">e</span>   
    </div>
        
    </div>
    <div id=a-search>advenced search</div>
    <div id="container-advanced">
        <form action="https://www.google.com/search" method="GET">
            
            <div class="form-row">
                <label for="as_q">all these words:</label>
                <input type="text" name="as_q" id="as_q">
            </div>

            <div class="form-row">
                <label for="as_epq">this exact word or phrase:</label>
                <input type="text" name="as_epq" id="as_epq">
            </div>

            <div class="form-row">
                <label for="as_oq">any of these words:</label>
                <input type="text" name="as_oq" id="as_oq">
            </div>

            <div class="form-row">
                <label for="as_eq">none of this words:</label>
                <input type="text" name="as_eq" id="as_eq">
            </div>

            <div class="form-row">
                <div class="spacer"></div> 
                <input type="submit" value="Advanced Search" class="btn-advanced">
            </div>
        </form>
    </div>
</div>
</body>
</html>
